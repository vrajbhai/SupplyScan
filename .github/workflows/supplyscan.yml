name: SupplyScan

on:
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  supplyscan:
    name: SupplyScan dependency gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SupplyScan
        # run: python -m pip install .[dev]
        # This line was updated to pull from GitHub!
        run: pip install git+https://github.com/vrajbhai/SupplyScan.git 

      - name: Ensure requirements file exists
        run: |
          if [ ! -f requirements.txt ]; then
            touch requirements.txt
          fi

      - name: Run SupplyScan
        id: scan
        shell: bash
        run: |
          set +e
          supplyscan check -r requirements.txt > supplyscan-result.txt 2>&1
          status=$?
          cat supplyscan-result.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Comment SupplyScan result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = `${{ steps.scan.outputs.status || 'unknown' }}`;
            const body = fs.existsSync('supplyscan-result.txt')
              ? fs.readFileSync('supplyscan-result.txt', 'utf8')
              : 'SupplyScan did not produce output.';
            const verdict = status === '0'
              ? 'SupplyScan passed.'
              : 'SupplyScan blocked this pull request because CRITICAL or HIGH findings were detected.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## SupplyScan\n\n${verdict}\n\n\`\`\`\n${body}\n\`\`\``
            });
